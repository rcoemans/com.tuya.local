<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 20px; color: #333; }
    h2 { margin-bottom: 8px; }
    p { color: #666; margin-bottom: 16px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-weight: 600; margin-bottom: 4px; font-size: 14px; }
    input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
    input:focus, select:focus { outline: none; border-color: #00A6A6; }
    .hint { font-size: 12px; color: #999; margin-top: 2px; }
    .btn { background: #00A6A6; color: #fff; border: none; padding: 12px 24px; border-radius: 6px; font-size: 16px; cursor: pointer; width: 100%; margin-top: 8px; }
    .btn:hover { background: #008f8f; }
  </style>
</head>
<body>
  <h2 data-i18n="pair.credentials.title">Device Credentials</h2>
  <p data-i18n="pair.credentials.description">Enter the connection details for your Tuya device. You can find these in the Tuya IoT Platform or using tools like tinytuya.</p>

  <div class="form-group">
    <label data-i18n="pair.credentials.name">Device Name</label>
    <input type="text" id="name" placeholder="My Tuya Device">
  </div>

  <div class="form-group">
    <label data-i18n="pair.credentials.host">Host / IP Address</label>
    <input type="text" id="host" placeholder="192.168.1.100">
    <div class="hint" data-i18n="pair.credentials.host_hint">IP address or hostname of the Tuya device on your local network.</div>
  </div>

  <div class="form-group">
    <label data-i18n="pair.credentials.device_id">Device ID</label>
    <input type="text" id="device_id" placeholder="bf1234567890abcdef">
  </div>

  <div class="form-group">
    <label data-i18n="pair.credentials.local_key">Local Key</label>
    <input type="password" id="local_key" placeholder="0123456789abcdef">
  </div>

  <div class="form-group">
    <label data-i18n="pair.credentials.protocol_version">Protocol Version</label>
    <select id="protocol_version">
      <option value="3.3" selected>3.3</option>
      <option value="3.1">3.1</option>
      <option value="3.2">3.2</option>
      <option value="3.4">3.4</option>
      <option value="3.5">3.5</option>
    </select>
  </div>

  <div class="form-group">
    <label data-i18n="pair.credentials.node_id">Node ID (optional)</label>
    <input type="text" id="node_id" placeholder="">
    <div class="hint" data-i18n="pair.credentials.node_id_hint">Only needed for sub-devices connected via a Tuya hub/gateway.</div>
  </div>

  <script type="application/javascript">
    function save() {
      if (typeof Homey === 'undefined') return;
      Homey.emit('set_device_data', {
        host: document.getElementById('host').value.trim(),
        deviceId: document.getElementById('device_id').value.trim(),
        localKey: document.getElementById('local_key').value.trim(),
        protocolVersion: document.getElementById('protocol_version').value,
        nodeId: document.getElementById('node_id').value.trim(),
        name: document.getElementById('name').value.trim(),
      }).catch(function() {});
    }

    document.getElementById('host').addEventListener('input', save);
    document.getElementById('device_id').addEventListener('input', save);
    document.getElementById('local_key').addEventListener('input', save);
    document.getElementById('protocol_version').addEventListener('change', save);
    document.getElementById('node_id').addEventListener('input', save);
    document.getElementById('name').addEventListener('input', save);
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 20px; color: #333; }
    h2 { margin-bottom: 8px; }
    p { color: #666; margin-bottom: 16px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-weight: 600; margin-bottom: 4px; font-size: 14px; }
    input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
    input:focus, select:focus { outline: none; border-color: #00A6A6; }
    .hint { font-size: 12px; color: #999; margin-top: 2px; }
    .btn { background: #00A6A6; color: #fff; border: none; padding: 12px 24px; border-radius: 6px; font-size: 16px; cursor: pointer; width: 100%; margin-top: 8px; }
    .btn:hover { background: #008f8f; }
    .status { padding: 12px; border-radius: 6px; margin-bottom: 16px; display: none; }
    .status.success { background: #d4edda; color: #155724; }
    .status.error { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>
  <h2 data-i18n="pair.repair.title">Update Connection Details</h2>
  <p data-i18n="pair.repair.description">Update the host, local key, or protocol version if your device has changed IP or been re-paired.</p>

  <div id="statusBox" class="status"></div>

  <div class="form-group">
    <label data-i18n="pair.credentials.host">Host / IP Address</label>
    <input type="text" id="host" placeholder="192.168.1.100">
  </div>

  <div class="form-group">
    <label data-i18n="pair.credentials.local_key">Local Key</label>
    <input type="password" id="local_key" placeholder="0123456789abcdef">
  </div>

  <div class="form-group">
    <label data-i18n="pair.credentials.protocol_version">Protocol Version</label>
    <select id="protocol_version">
      <option value="3.3" selected>3.3</option>
      <option value="3.1">3.1</option>
      <option value="3.2">3.2</option>
      <option value="3.4">3.4</option>
      <option value="3.5">3.5</option>
    </select>
  </div>

  <button id="saveBtn" class="btn" data-i18n="pair.repair.save">Save & Reconnect</button>

  <script>
    function onHomeyReady(Homey) {
      Homey.ready();

      var statusBox = document.getElementById('statusBox');

      Homey.emit('get_device_settings', null, function(err, settings) {
        if (settings) {
          document.getElementById('host').value = settings.host || '';
          document.getElementById('local_key').value = '';
          document.getElementById('protocol_version').value = settings.protocol_version || '3.3';
        }
      });

      document.getElementById('saveBtn').addEventListener('click', function() {
        var data = {
          host: document.getElementById('host').value.trim(),
          localKey: document.getElementById('local_key').value.trim(),
          protocolVersion: document.getElementById('protocol_version').value,
        };

        Homey.emit('update_credentials', data, function(err, result) {
          if (err) {
            statusBox.className = 'status error';
            statusBox.style.display = 'block';
            statusBox.textContent = 'Error: ' + (err.message || err);
            return;
          }
          statusBox.className = 'status success';
          statusBox.style.display = 'block';
          statusBox.textContent = 'Settings saved! The device will reconnect.';
          setTimeout(function() { Homey.done(); }, 2000);
        });
      });
    }
  </script>
</body>
</html>
